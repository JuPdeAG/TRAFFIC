services:
  postgres:
    image: imresamu/postgis:15-3.4-alpine
    ports:
      - "5433:5432"
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic}
      POSTGRES_DB: traffic_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 192m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-change-me}
      DOCKER_INFLUXDB_INIT_ORG: traffic-ai
      DOCKER_INFLUXDB_INIT_BUCKET: traffic_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-change-me}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://traffic:${POSTGRES_PASSWORD:-traffic}@postgres:5432/traffic_ai
      REDIS_URL: redis://redis:6379/0
      INFLUX_URL: http://influxdb:8086
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 256m

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A traffic_ai.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://traffic:${POSTGRES_PASSWORD:-traffic}@postgres:5432/traffic_ai
      REDIS_URL: redis://redis:6379/0
      INFLUX_URL: http://influxdb:8086
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 896m

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A traffic_ai.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://traffic:${POSTGRES_PASSWORD:-traffic}@postgres:5432/traffic_ai
      REDIS_URL: redis://redis:6379/0
      INFLUX_URL: http://influxdb:8086
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 128m

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    command: celery --broker=redis://redis:6379/0 flower --basic_auth=admin:flower123
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - traffic-ai-net
    restart: unless-stopped
    mem_limit: 128m

networks:
  traffic-ai-net:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
